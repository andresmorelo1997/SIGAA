{% load static i18n %}
{% load horillafilters %}
<style>
    .round { border-radius: 50%; }
    .fab {
        transition: all 300ms ease-in-out;
        width: 56px; height: 56px;
        background-color: #A6192E;
        display: flex; align-items: center; justify-content: center;
        position: fixed; right: 10px; bottom: 35px;
        user-select: none; cursor: pointer; color: white; font-size: 2em;
        box-shadow: 0px 3px 10px rgba(0,0,0,0.16), 0px 3px 10px rgba(0,0,0,0.16);
        z-index: 10;
    }
    .fab i, .fab span { transition: all 300ms ease-in-out; will-change: transform; }
    .inner-fabs .fab {
        width: 40px; height: 40px;
        right: 20px; bottom: 40px;
        font-size: 1.5em; will-change: bottom;
    }
    .inner-fabs.show .fab:nth-child(1) { bottom: 100px; }
    .inner-fabs.show .fab:nth-child(2) { bottom: 150px; }
    .inner-fabs.show .fab:nth-child(3) { bottom: 200px; }
    .inner-fabs.show .fab:nth-child(4) { bottom: 250px; }
    .inner-fabs.show .fab:nth-child(5) { bottom: 300px; }
    .inner-fabs.show + .fab i { transform: rotate(135deg); }
    .fab:before {
        content: attr(data-tooltip);
        transition: opacity 150ms cubic-bezier(0.4, 0, 1, 1);
        position: absolute; visibility: hidden; opacity: 0;
        box-shadow: 0 1px 2px rgba(0,0,0,0.15);
        color: #ececec; right: 50px; top: 25%;
        background-color: rgba(70,70,70,0.9);
        font-size: 0.5em; line-height: 1em;
        display: inline-block; text-align: center; white-space: nowrap;
        border-radius: 2px; padding: 6px 8px; max-width: 220px;
        font-weight: bold; text-overflow: ellipsis; vertical-align: middle;
    }
    .fab:hover:before { content: attr(data-tooltip); visibility: visible; opacity: 1; }
    .inner-fabs a { display: block; }
</style>

{# Acciones rápidas SIGAA · Universidad del Sinú #}
<div class="inner-fabs">
    <div id="fab5" class="fab round" data-tooltip="{% trans 'Panel de Planta Profesoral' %}">
        <a class="text-light" href="{% url 'academic-dashboard' %}">
            <span class="material-symbols-outlined mt-2">dashboard</span>
        </a>
    </div>
    <div id="fab4" class="fab round" data-tooltip="{% trans 'Importar Carga Académica' %}">
        <a class="text-light" href="{% url 'academic-load-import' %}">
            <span class="material-symbols-outlined mt-2">upload_file</span>
        </a>
    </div>
    <div id="fab3" class="fab round" data-tooltip="{% trans 'Importar Plan de Estudios' %}">
        <a class="text-light" href="{% url 'plan-import' %}">
            <span class="material-symbols-outlined mt-2">menu_book</span>
        </a>
    </div>
    <div id="fab2" class="fab round" data-tooltip="{% trans 'Nuevo Corte de Prenómina' %}">
        <a class="text-light" href="{% url 'payroll-corte-new' %}">
            <span class="material-symbols-outlined mt-2">event_upcoming</span>
        </a>
    </div>
    <div id="fab6" class="fab round" data-tooltip="{% trans 'Crear Docente' %}">
        <a class="text-light" href="{% url 'employee-view-new' %}">
            <span class="material-symbols-outlined mt-2">person_add</span>
        </a>
    </div>
</div>
<div id="fab1" class="fab round" data-tooltip="{% trans 'Acciones rápidas' %}">
    <i id="fabIcon" class="material-icons">add</i>
</div>

<script>
    $(document).ready(function () {
        let fab1 = $("#fab1");
        let innerFabs = $(".inner-fabs");
        fab1.on("click", function () { innerFabs.toggleClass("show"); });
        $(document).on("click", function (e) {
            let targetId = $(e.target);
            let allowed = ["fab1","fab2","fab3","fab4","fab5","fab6","fabIcon"];
            let isClose = targetId.hasClass("oh-modal__close") || targetId.hasClass("oh-modal__close--custom");
            if (!(allowed.includes(targetId.closest(".fab").attr("id")) || isClose)) {
                innerFabs.removeClass("show");
            }
        });
    });
</script>
